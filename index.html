    {
      "@context": "https://schema.org",
      "@type": "FinancialService",
      "name": "World Bridge Capital",
      "description": "Trade finance investment platform for accredited investors offering asset-backed invoice positions.",

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What exactly is invoice factoring and how does it generate returns?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Invoice factoring is the purchase of accounts receivable at a discount. A business owed money by a creditworthy buyer sells that invoice to World Bridge at a discount. When the buyer pays the full amount, the spread is earned as return. The asset backing the investment is the invoice itself — a legal payment obligation."
          }
        },
        {
          "@type": "Question",
          "name": "What makes this cross-border and why does that matter?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "World Bridge Capital specialises in trade finance across international borders. Cross-border deal flow is less competed than domestic factoring, providing access to better margins and stronger risk-adjusted returns for investors."
          }
        },
        {
          "@type": "Question",
          "name": "How is my capital secured?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Every position is backed by a verified invoice from an identified buyer. Buyer creditworthiness is assessed and legal recourse established before capital deploys. Risk is managed through diversification across transactions, industries, and geographies."
          }
        },
        {
          "@type": "Question",
          "name": "What does accredited investor mean?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "An accredited investor generally has annual income exceeding $200K ($300K jointly) for the past two years, or net worth exceeding $1M excluding primary residence. Certain professional certifications also qualify."
          }
        }
      ]
    }
    </script>
